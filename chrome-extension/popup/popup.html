<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Unibox Prospector</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 300px;
    background: #0a0a0a;
    color: rgba(255,255,255,0.7);
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    font-size: 10px;
    padding: 16px;
  }
  .logo { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: #00ff41; animation: pulse 2.5s ease-in-out infinite; }
  .logo-text { font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.5); }
  .version { font-size: 8px; color: rgba(255,255,255,0.15); margin-left: auto; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 8px; color: rgba(255,255,255,0.25); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
  .field input {
    width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 4px; padding: 8px 10px; font-size: 10px; color: rgba(255,255,255,0.6);
    font-family: inherit; outline: none; transition: border-color 0.15s;
  }
  .field input:focus { border-color: #00ff41; }
  .btn-save {
    width: 100%; background: transparent; color: #00ff41; border: 1px solid #00ff41;
    border-radius: 4px; padding: 8px; font-size: 9px; font-weight: 600; cursor: pointer;
    letter-spacing: 0.08em; text-transform: uppercase; font-family: inherit; transition: background 0.15s;
  }
  .btn-save:hover { background: rgba(0,255,65,0.1); }
  .status { margin-top: 8px; font-size: 9px; min-height: 14px; letter-spacing: 0.05em; }
  .divider { height: 1px; background: rgba(255,255,255,0.06); margin: 14px 0; }
  .info-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .info-label { font-size: 8px; color: rgba(255,255,255,0.15); text-transform: uppercase; letter-spacing: 0.08em; }
  .info-val { font-size: 8px; color: rgba(255,255,255,0.35); }
  .info-val.ok { color: #00ff41; }
  .info-val.err { color: #ff3333; }
  @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
</style>
</head>
<body>
  <div class="logo">
    <div class="logo-dot"></div>
    <div class="logo-text">Unibox.os</div>
    <div class="version">v2.0.0</div>
  </div>
  <div class="field">
    <label>Api_Key</label>
    <input type="password" id="apiKey" placeholder="Enter Unibox API key..." />
  </div>
  <div class="field">
    <label>Crm_Url</label>
    <input type="text" id="crmUrl" placeholder="https://txb-unibox.vercel.app" />
  </div>
  <button id="save" class="btn-save">■ Save Config</button>
  <div id="status" class="status"></div>
  <div class="divider"></div>
  <div class="info-row"><span class="info-label">Sys_Version</span><span class="info-val">2.0.0</span></div>
  <div class="info-row"><span class="info-label">Connection</span><span class="info-val" id="conn-status">CHECKING...</span></div>
  <div class="info-row"><span class="info-label">Session_Cache</span><span class="info-val" id="cache-count">—</span></div>
  <script src="popup.js"></script>
</body>
</html>
